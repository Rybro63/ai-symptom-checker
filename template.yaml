AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  AI Symptom Checker API — FastAPI on Lambda behind HTTP API Gateway,
  with a DynamoDB table for assessment history.

Parameters:
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key (passed at deploy time, never committed)

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.13

Resources:
  SymptomCheckerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.main.handler
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          DYNAMODB_TABLE_NAME: !Ref ChecksTable
          # AWS_REGION is provided automatically by the Lambda runtime
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChecksTable
      Events:
        PublicHealth:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /health
            Method: GET
        PublicDocs:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /docs
            Method: GET
        PublicOpenApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /openapi.json
            Method: GET
        ProtectedApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/{proxy+}
            Method: ANY
            Auth:
              Authorizer: CognitoAuthorizer

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Auth:
        Authorizers:
          CognitoAuthorizer:
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}
              audience:
                - !Ref UserPoolClient
            IdentitySource: $request.header.Authorization

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: symptom-checker-users
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireUppercase: false
          RequireSymbols: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: symptom-checker-web
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  ChecksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: symptom-checks
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: check_id
          AttributeType: S
        - AttributeName: entity
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: check_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: by-date
          KeySchema:
            - AttributeName: entity
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

Outputs:
  ApiUrl:
    Description: Base URL of the deployed API
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  TableName:
    Description: DynamoDB table storing assessment history
    Value: !Ref ChecksTable
  UserPoolId:
    Description: Cognito User Pool ID (needed by the frontend)
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito App Client ID (needed by the frontend)
    Value: !Ref UserPoolClient
